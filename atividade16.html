<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade16</title>
</head>
<body>
    <h1>atividade16</h1>
    <p>Digite os números para cacular</p>

    <input type="number" name="" id="num1" placeholder="digite o número">
    <input type="number" name="" id="num2" placeholder="digite o número">
      
    <button onclick="somar()">somar</button>

    <p id="resultado"></p> 
     
    <script>
      function somar(){
     let num1 = Number (document.getElementById ("num1").value);
     let num2 = Number (document.getElementById ("num2").value);
     
     let total = num1 + num2;
      
      document.getElementById("resultado").innerHTML = "o resultado é:" +total;
     
     
      }


     </script>
    <body>
